name: Build cloud firmware probe catalog

on:
  workflow_dispatch:
    inputs:
      device:
        description: Apple hardware identifier
        required: true
        default: iPhone17,3
        type: string
      build:
        description: Exact iOS build identifier
        required: true
        default: 24A5380h
        type: string
      maximum_programs:
        description: Maximum launchd Program binaries to extract
        required: true
        default: "768"
        type: string
  push:
    branches: [main]
    paths:
      - .github/workflows/cloud-firmware-lab.yml

permissions:
  contents: write

concurrency:
  group: cloud-firmware-lab-${{ github.ref }}-${{ inputs.build || '24A5380h' }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: macos-26-intel
    timeout-minutes: 120
    env:
      TARGET_DEVICE: ${{ inputs.device || 'iPhone17,3' }}
      TARGET_BUILD: ${{ inputs.build || '24A5380h' }}
      MAXIMUM_PROGRAMS: ${{ inputs.maximum_programs || '768' }}

    steps:
      - name: Check out Aegis27
        uses: actions/checkout@v4

      - name: Validate workflow inputs
        shell: bash
        run: |
          set -euo pipefail
          [[ "$TARGET_DEVICE" =~ ^[A-Za-z0-9]+,[0-9]+$ ]]
          [[ "$TARGET_BUILD" =~ ^[A-Za-z0-9]+$ ]]
          [[ "$MAXIMUM_PROGRAMS" =~ ^[0-9]+$ ]]
          test "$MAXIMUM_PROGRAMS" -ge 1
          test "$MAXIMUM_PROGRAMS" -le 2048

      - name: Reclaim firmware-analysis disk
        shell: bash
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf /Applications/Xcode*.app || true
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/* || true
          rm -rf "$HOME/Library/Developer/Xcode/DerivedData" || true
          brew cleanup --prune=all || true
          df -h /

      - name: Install firmware tooling
        shell: bash
        run: |
          set -euo pipefail
          brew tap blacktop/tap
          brew trust blacktop/tap
          brew install --formula blacktop/tap/ipsw
          ipsw version | tee ipsw-version.txt

      - name: Resolve exact IPSW URL without downloading it
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p firmware/extracted firmware/report
          ipsw --no-color download appledb \
            --os iOS \
            --type ipsw \
            --device "$TARGET_DEVICE" \
            --build "$TARGET_BUILD" \
            --urls \
            --json > firmware/appledb-query.json

          IPSW_URL="$(python3 - <<'PY'
          import json
          import os
          import pathlib
          import re

          path = pathlib.Path('firmware/appledb-query.json')
          text = path.read_text(errors='replace')
          urls = []

          def walk(value):
              if isinstance(value, dict):
                  for item in value.values():
                      walk(item)
              elif isinstance(value, list):
                  for item in value:
                      walk(item)
              elif isinstance(value, str) and value.startswith('https://') and '.ipsw' in value:
                  urls.append(value)

          try:
              walk(json.loads(text))
          except json.JSONDecodeError:
              pass

          urls.extend(re.findall(r'https://[^\s"\']+?\.ipsw(?:\?[^\s"\']*)?', text))
          device = os.environ['TARGET_DEVICE']
          build = os.environ['TARGET_BUILD']
          ordered = sorted(set(urls), key=lambda url: (device not in url, build not in url, len(url)))
          if not ordered:
              raise SystemExit('AppleDB returned no IPSW URL')
          print(ordered[0])
          PY
          )"

          [[ "$IPSW_URL" == https://*.ipsw* ]]
          echo "IPSW_URL=$IPSW_URL" >> "$GITHUB_ENV"
          printf '%s\n' "$IPSW_URL" > firmware/ipsw-source-url.txt
          shasum -a 256 firmware/ipsw-source-url.txt > firmware/source-url.sha256
          ipsw --no-color info --remote "$IPSW_URL" --json > firmware/ipsw-info.json
          grep -q "$TARGET_BUILD" firmware/ipsw-info.json
          grep -q "$TARGET_DEVICE" firmware/ipsw-info.json

      - name: Extract launchd and sandbox metadata remotely
        shell: bash
        run: |
          set -euo pipefail
          ipsw --no-color extract --remote "$IPSW_URL" --files \
            --pattern '.*(Library/LaunchDaemons|System/Library/LaunchDaemons)/.*\.plist$' \
            --output firmware/extracted
          ipsw --no-color extract --remote "$IPSW_URL" --files \
            --pattern '.*System/Library/Sandbox/Profiles/.*' \
            --output firmware/extracted || true
          df -h /

      - name: Plan bounded service-binary extraction
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/cloud_firmware_lab.py plan firmware/extracted \
            --maximum-programs "$MAXIMUM_PROGRAMS" \
            --regex-output firmware/program-regex.txt \
            --paths-output firmware/program-paths.txt
          test -s firmware/program-regex.txt
          test -s firmware/program-paths.txt

      - name: Extract referenced service binaries remotely
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import pathlib
          import subprocess

          pattern = pathlib.Path('firmware/program-regex.txt').read_text().strip()
          subprocess.run([
              'ipsw', '--no-color', 'extract', '--remote', os.environ['IPSW_URL'],
              '--files', '--pattern', pattern, '--output', 'firmware/extracted'
          ], check=True)
          PY
          df -h /

      - name: Build evidence report and inert catalog
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/cloud_firmware_lab.py analyze firmware/extracted \
            --device "$TARGET_DEVICE" \
            --build "$TARGET_BUILD" \
            --output-dir firmware/report
          cp firmware/appledb-query.json firmware/report/
          cp firmware/ipsw-info.json firmware/report/
          cp firmware/ipsw-source-url.txt firmware/report/
          cp firmware/source-url.sha256 firmware/report/
          cp firmware/program-paths.txt firmware/report/
          cp ipsw-version.txt firmware/report/
          python3 -m json.tool firmware/report/aegis27-probe-catalog.json >/dev/null
          python3 -m json.tool firmware/report/firmware-lab-report.json >/dev/null
          shasum -a 256 firmware/report/*.json > firmware/report/JSON-SHA256SUMS
          rm -rf firmware/extracted

      - name: Publish exact compact catalog to the app
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p Resources/FirmwareCatalogs
          CATALOG_PATH="Resources/FirmwareCatalogs/${TARGET_BUILD}.json"
          cp firmware/report/aegis27-probe-catalog.json "$CATALOG_PATH"
          python3 -m json.tool "$CATALOG_PATH" >/dev/null

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CATALOG_PATH"
          if git diff --cached --quiet; then
            echo "Bundled catalog is already current."
            exit 0
          fi
          git commit -m "Bundle generated ${TARGET_BUILD} firmware probe catalog"
          git push

      - name: Publish summary
        shell: bash
        run: cat firmware/report/SUMMARY.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload catalog and evidence only
        uses: actions/upload-artifact@v4
        with:
          name: Aegis27-firmware-lab-${{ env.TARGET_DEVICE }}-${{ env.TARGET_BUILD }}
          path: firmware/report/
          if-no-files-found: error
          retention-days: 14
