name: Aegis27
options:
  bundleIdPrefix: com.nightvibes33
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  Aegis27:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Models
      - path: Services
      - path: ViewModels
      - path: Views
    info:
      path: Resources/Info.plist
    entitlements:
      path: Resources/Aegis27.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nightvibes33.Aegis27
        PRODUCT_NAME: Aegis27
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    scheme:
      gatherCoverageData: false

